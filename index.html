<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OcupIA — Mercado Laboral Español</title>
<meta name="description" content="Treemap interactivo del mercado laboral español: perspectiva, salario, formación y exposición a la IA de ~54 ocupaciones.">
<meta property="og:title" content="OcupIA — Mercado Laboral Español">
<meta property="og:description" content="Visualización interactiva de ocupaciones con datos del INE (EPA, EAES).">
<meta property="og:type" content="website">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0f0f1a;--bg2:#1a1a2e;--bg3:#16213e;
  --text:#e8e8f0;--text-dim:#8888aa;--accent:#4fc3f7;
  --green:hsl(120,60%,38%);--yellow:hsl(55,80%,50%);--red:hsl(0,65%,42%);
  --radius:6px;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;
  background:var(--bg);color:var(--text);display:flex;flex-direction:column;
}
#header{
  padding:12px 20px 8px;background:var(--bg2);border-bottom:1px solid #2a2a4e;
  flex-shrink:0;
}
#header h1{font-size:1.3rem;font-weight:700;letter-spacing:-.5px}
#header .sub{font-size:.78rem;color:var(--text-dim);margin-top:2px}
#controls{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;align-items:center}
.layer-btn{
  padding:6px 16px;border:1px solid #3a3a5e;border-radius:var(--radius);
  background:var(--bg);color:var(--text-dim);cursor:pointer;font-size:.8rem;
  transition:all .15s;
}
.layer-btn:hover{border-color:var(--accent);color:var(--text)}
.layer-btn.active{background:var(--accent);color:#0f0f1a;border-color:var(--accent);font-weight:600}
#layer-desc{font-size:.72rem;color:var(--text-dim);margin-left:8px;max-width:480px}
#main{flex:1;display:flex;overflow:hidden;min-height:0}
#treemap-wrap{flex:1;position:relative;min-width:0}
#treemap{display:block;width:100%;height:100%;cursor:pointer}
#tooltip{
  position:fixed;pointer-events:none;z-index:100;display:none;
  background:rgba(15,15,26,.94);border:1px solid #3a3a5e;border-radius:var(--radius);
  padding:10px 14px;font-size:.75rem;line-height:1.5;max-width:340px;
  box-shadow:0 4px 20px rgba(0,0,0,.5);
}
#tooltip .tt-title{font-weight:700;font-size:.85rem;color:var(--accent);margin-bottom:4px}
#tooltip .tt-cat{color:var(--text-dim);font-size:.68rem;margin-bottom:6px}
#tooltip .tt-row{display:flex;justify-content:space-between;gap:16px}
#tooltip .tt-label{color:var(--text-dim)}
#tooltip .tt-val{font-weight:600}
#tooltip .tt-rationale{margin-top:6px;font-style:italic;color:var(--text-dim);font-size:.68rem;border-top:1px solid #2a2a4e;padding-top:6px}
#sidebar{
  width:260px;background:var(--bg2);border-left:1px solid #2a2a4e;
  padding:14px;overflow-y:auto;flex-shrink:0;font-size:.73rem;
}
#sidebar h3{font-size:.82rem;margin-bottom:10px;color:var(--accent)}
.stat-row{display:flex;justify-content:space-between;margin-bottom:6px}
.stat-label{color:var(--text-dim)}
.stat-val{font-weight:600}
.dist-bar-wrap{margin-bottom:4px}
.dist-bar-label{font-size:.65rem;color:var(--text-dim);margin-bottom:1px}
.dist-bar-outer{height:14px;background:#1a1a30;border-radius:3px;overflow:hidden}
.dist-bar-inner{height:100%;border-radius:3px;transition:width .3s}
.dist-bar-pct{font-size:.6rem;color:var(--text-dim);float:right;margin-top:-13px;margin-right:3px;position:relative}
#footer{
  padding:6px 20px;background:var(--bg2);border-top:1px solid #2a2a4e;
  font-size:.65rem;color:var(--text-dim);flex-shrink:0;
  display:flex;justify-content:space-between;flex-wrap:wrap;gap:4px;
}
#footer a{color:var(--accent);text-decoration:none}
#footer a:hover{text-decoration:underline}
#loading{
  position:fixed;top:0;left:0;right:0;bottom:0;
  background:var(--bg);display:flex;align-items:center;justify-content:center;
  flex-direction:column;z-index:200;
}
#loading .spinner{
  width:40px;height:40px;border:3px solid #2a2a4e;border-top-color:var(--accent);
  border-radius:50%;animation:spin 1s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg)}}
#loading p{margin-top:14px;color:var(--text-dim);font-size:.85rem}
#error-msg{display:none;padding:40px;text-align:center;color:var(--red)}
@media(max-width:768px){
  #sidebar{display:none}
  #header h1{font-size:1.1rem}
  .layer-btn{padding:5px 10px;font-size:.72rem}
  #layer-desc{display:none}
}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div><p>Cargando datos del mercado laboral...</p></div>

<div id="header">
  <h1>Mercado Laboral Espa&ntilde;ol</h1>
  <div class="sub" id="subtitle"></div>
  <div id="controls">
    <button class="layer-btn active" data-layer="outlook">Perspectiva</button>
    <button class="layer-btn" data-layer="pay">Salario</button>
    <button class="layer-btn" data-layer="education">Formaci&oacute;n</button>
    <button class="layer-btn" data-layer="exposure">Exposici&oacute;n IA</button>
    <span id="layer-desc"></span>
  </div>
</div>

<div id="main">
  <div id="treemap-wrap">
    <canvas id="treemap"></canvas>
    <div id="error-msg"></div>
  </div>
  <div id="sidebar">
    <h3 id="stats-title">Estad&iacute;sticas</h3>
    <div id="stats-summary"></div>
    <div id="stats-dist" style="margin-top:12px"></div>
  </div>
</div>

<div id="tooltip">
  <div class="tt-title"></div>
  <div class="tt-cat"></div>
  <div class="tt-row"><span class="tt-label">Empleo</span><span class="tt-val" id="tt-jobs"></span></div>
  <div class="tt-row"><span class="tt-label">Salario medio</span><span class="tt-val" id="tt-pay"></span></div>
  <div class="tt-row"><span class="tt-label">Perspectiva</span><span class="tt-val" id="tt-outlook"></span></div>
  <div class="tt-row"><span class="tt-label">Formaci&oacute;n</span><span class="tt-val" id="tt-edu"></span></div>
  <div class="tt-row"><span class="tt-label">Exposici&oacute;n IA</span><span class="tt-val" id="tt-ai"></span></div>
  <div class="tt-rationale" id="tt-rationale"></div>
</div>

<div id="footer">
  <span>Datos: <a href="https://www.ine.es" target="_blank" rel="noopener">INE</a> (EPA, EAES) &middot; Generado: <span id="ft-date"></span></span>
  <span>Inspirado en <a href="https://karpathy.ai/jobs/" target="_blank" rel="noopener">karpathy.ai/jobs</a></span>
</div>

<script>
"use strict";

/* ── Formatters ── */
const fmtN = new Intl.NumberFormat("es-ES");
const fmtEUR = new Intl.NumberFormat("es-ES", {style:"currency", currency:"EUR", maximumFractionDigits:0});
const fmtPct = new Intl.NumberFormat("es-ES", {style:"percent", minimumFractionDigits:1, maximumFractionDigits:1});

/* ── Layer definitions ── */
const LAYERS = {
  outlook: {
    title: "Perspectiva de crecimiento",
    desc: "Variaci\u00f3n interanual del empleo. Verde = crecimiento, rojo = descenso.",
    field: "outlook",
    fmt: v => (v >= 0 ? "+" : "") + v.toFixed(1) + "%",
    color: v => {
      // -5..+10 range mapped to red..green
      const t = Math.max(0, Math.min(1, (v + 5) / 15));
      return lerpColor(t);
    },
    statLabel: "Crecimiento medio ponderado"
  },
  pay: {
    title: "Salario medio anual",
    desc: "Ganancia media anual bruta. Verde = menor, rojo = mayor (escala logar\u00edtmica).",
    field: "pay",
    fmt: v => fmtEUR.format(v),
    color: v => {
      // 15000..65000 log scale, inverted (green=low, red=high)
      const logMin = Math.log(15000), logMax = Math.log(65000);
      const t = Math.max(0, Math.min(1, (Math.log(Math.max(v, 15000)) - logMin) / (logMax - logMin)));
      return lerpColor(1 - t);
    },
    statLabel: "Salario medio ponderado"
  },
  education: {
    title: "Formaci\u00f3n requerida",
    desc: "Nivel educativo t\u00edpico. Verde = sin cualificaci\u00f3n, rojo = doctorado.",
    field: "education_level",
    fmt: (v, occ) => occ && occ.education ? occ.education : "Nivel " + (typeof v === "number" ? v.toFixed(1) : v),
    color: v => {
      const t = Math.max(0, Math.min(1, (v - 1) / 7));
      return lerpColor(1 - t);
    },
    statLabel: "Nivel medio ponderado"
  },
  exposure: {
    title: "Exposici\u00f3n a la IA",
    desc: "Estimaci\u00f3n del impacto de la IA. 0 = sin impacto, 10 = alta transformaci\u00f3n.",
    field: "exposure",
    fmt: v => (typeof v === "number" ? v.toFixed(1) : v) + "/10",
    color: v => {
      const t = Math.max(0, Math.min(1, v / 10));
      return lerpColor(1 - t);
    },
    statLabel: "Exposici\u00f3n media ponderada"
  }
};

function lerpColor(t) {
  // t: 0=red, 0.5=yellow, 1=green
  let h, s, l;
  if (t <= 0.5) {
    const u = t / 0.5;
    h = 0 + u * 55;
    s = 65 + u * 15;
    l = 38 + u * 12;
  } else {
    const u = (t - 0.5) / 0.5;
    h = 55 + u * 65;
    s = 80 - u * 15;
    l = 50 - u * 12;
  }
  return `hsl(${h},${s}%,${l}%)`;
}

function darkenColor(hslStr, amount) {
  const m = hslStr.match(/hsl\(([^,]+),([^,]+)%,([^)]+)%\)/);
  if (!m) return hslStr;
  return `hsl(${m[1]},${m[2]}%,${Math.max(0, parseFloat(m[3]) - amount)}%)`;
}

/* ── Squarified treemap ── */
function squarify(items, rect) {
  if (!items.length) return [];
  const totalArea = items.reduce((s, i) => s + i._area, 0);
  if (totalArea <= 0) return items;
  const scale = (rect.w * rect.h) / totalArea;
  items.forEach(i => i._scaledArea = i._area * scale);
  const sorted = [...items].sort((a, b) => b._scaledArea - a._scaledArea);
  layoutItems(sorted, {x: rect.x, y: rect.y, w: rect.w, h: rect.h});
  return items;
}

function layoutItems(items, rect) {
  if (!items.length) return;
  if (items.length === 1) {
    items[0]._rect = {x: rect.x, y: rect.y, w: rect.w, h: rect.h};
    return;
  }
  const isWide = rect.w >= rect.h;
  let row = [items[0]];
  let rowArea = items[0]._scaledArea;
  const side = isWide ? rect.h : rect.w;

  for (let i = 1; i < items.length; i++) {
    const newRow = [...row, items[i]];
    const newArea = rowArea + items[i]._scaledArea;
    if (worstRatio(row, rowArea, side) >= worstRatio(newRow, newArea, side)) {
      row = newRow;
      rowArea = newArea;
    } else {
      break;
    }
  }

  // Lay out row
  const rowLen = rowArea / side;
  let pos = 0;
  for (const item of row) {
    const itemLen = item._scaledArea / rowLen;
    if (isWide) {
      item._rect = {x: rect.x, y: rect.y + pos, w: rowLen, h: itemLen};
    } else {
      item._rect = {x: rect.x + pos, y: rect.y, w: itemLen, h: rowLen};
    }
    pos += itemLen;
  }

  // Recurse on remaining
  const remaining = items.slice(row.length);
  if (remaining.length) {
    let newRect;
    if (isWide) {
      newRect = {x: rect.x + rowLen, y: rect.y, w: rect.w - rowLen, h: rect.h};
    } else {
      newRect = {x: rect.x, y: rect.y + rowLen, w: rect.w, h: rect.h - rowLen};
    }
    layoutItems(remaining, newRect);
  }
}

function worstRatio(row, totalArea, side) {
  if (!row.length || totalArea <= 0 || side <= 0) return Infinity;
  const rowLen = totalArea / side;
  if (rowLen <= 0) return Infinity;
  let worst = 0;
  for (const item of row) {
    const itemLen = item._scaledArea / rowLen;
    const r = Math.max(rowLen / itemLen, itemLen / rowLen);
    if (r > worst) worst = r;
  }
  return worst;
}

/* ── App state ── */
let DATA = null;
let currentLayer = "outlook";
let hoveredOcc = null;
let tileRects = []; // {occ, x, y, w, h}

const canvas = document.getElementById("treemap");
const ctx = canvas.getContext("2d");
const tooltip = document.getElementById("tooltip");

/* ── Data loading ── */
async function loadData() {
  try {
    const resp = await fetch("data.json");
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    DATA = await resp.json();
    // Filter out occupations with 0 jobs for the treemap
    DATA.occupations = DATA.occupations.filter(o => o.jobs > 0);
    DATA.occupations.sort((a, b) => b.jobs - a.jobs);
    init();
  } catch (e) {
    document.getElementById("loading").style.display = "none";
    const errEl = document.getElementById("error-msg");
    errEl.style.display = "block";
    errEl.innerHTML = `<h2>Error al cargar datos</h2><p>${e.message}</p><p style="margin-top:10px;font-size:.8rem">Aseg&uacute;rate de que <code>data.json</code> est&aacute; en el mismo directorio y sirve los archivos desde un servidor (no file://).</p>`;
  }
}

function init() {
  document.getElementById("loading").style.display = "none";
  document.getElementById("subtitle").textContent =
    `Visualizaci\u00f3n interactiva de ${DATA.occupations.length} ocupaciones \u00b7 ${fmtN.format(DATA.meta.total_employed)} empleados`;
  document.getElementById("ft-date").textContent = DATA.meta.generated || "2026";

  // Layer buttons
  document.querySelectorAll(".layer-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      document.querySelectorAll(".layer-btn").forEach(b => b.classList.remove("active"));
      btn.classList.add("active");
      currentLayer = btn.dataset.layer;
      document.getElementById("layer-desc").textContent = LAYERS[currentLayer].desc;
      render();
      updateStats();
    });
  });
  document.getElementById("layer-desc").textContent = LAYERS[currentLayer].desc;

  // Canvas events
  canvas.addEventListener("mousemove", onMouseMove);
  canvas.addEventListener("mouseleave", () => { hoveredOcc = null; tooltip.style.display = "none"; render(); });
  canvas.addEventListener("click", onClick);

  // Resize
  let resizeTimer;
  window.addEventListener("resize", () => { clearTimeout(resizeTimer); resizeTimer = setTimeout(() => { render(); }, 100); });

  render();
  updateStats();
}

/* ── Rendering ── */
function render() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  canvas.style.width = rect.width + "px";
  canvas.style.height = rect.height + "px";
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

  const W = rect.width, H = rect.height;
  ctx.fillStyle = "#0f0f1a";
  ctx.fillRect(0, 0, W, H);

  if (!DATA || !DATA.occupations.length) return;

  const layer = LAYERS[currentLayer];
  const pad = 2;

  // Group by category
  const cats = {};
  DATA.occupations.forEach(occ => {
    const c = occ.category_label;
    if (!cats[c]) cats[c] = {label: c, items: [], totalJobs: 0};
    cats[c].items.push(occ);
    cats[c].totalJobs += occ.jobs;
  });

  const catArr = Object.values(cats).sort((a, b) => b.totalJobs - a.totalJobs);
  catArr.forEach(c => c._area = c.totalJobs);

  // Layout categories
  squarify(catArr, {x: pad, y: pad, w: W - pad * 2, h: H - pad * 2});

  tileRects = [];

  for (const cat of catArr) {
    if (!cat._rect) continue;
    const cr = cat._rect;

    // Category header
    const headerH = Math.min(18, cr.h * 0.12);
    ctx.fillStyle = "rgba(255,255,255,0.06)";
    ctx.fillRect(cr.x, cr.y, cr.w, headerH);
    ctx.fillStyle = "#8888bb";
    ctx.font = `600 ${Math.min(11, headerH * 0.7)}px -apple-system,sans-serif`;
    ctx.textBaseline = "middle";
    if (cr.w > 60) {
      ctx.fillText(cat.label, cr.x + 4, cr.y + headerH / 2, cr.w - 8);
    }

    // Layout items within category
    const innerRect = {x: cr.x + 1, y: cr.y + headerH + 1, w: cr.w - 2, h: cr.h - headerH - 2};
    if (innerRect.w <= 0 || innerRect.h <= 0) continue;

    cat.items.forEach(occ => { occ._area = occ.jobs; });
    squarify(cat.items, innerRect);

    for (const occ of cat.items) {
      if (!occ._rect) continue;
      const r = occ._rect;
      const val = occ[layer.field];
      const color = layer.color(val);
      const isHovered = hoveredOcc === occ;

      // Tile background
      ctx.fillStyle = isHovered ? darkenColor(color, -10) : color;
      ctx.fillRect(r.x + 0.5, r.y + 0.5, r.w - 1, r.h - 1);

      // Border
      ctx.strokeStyle = isHovered ? "rgba(255,255,255,0.6)" : "rgba(0,0,0,0.4)";
      ctx.lineWidth = isHovered ? 2 : 0.5;
      ctx.strokeRect(r.x + 0.5, r.y + 0.5, r.w - 1, r.h - 1);

      tileRects.push({occ, x: r.x, y: r.y, w: r.w, h: r.h});

      // Text
      if (r.w > 30 && r.h > 18) {
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        const maxFontSize = Math.min(13, r.w / 8, r.h / 4);
        const fontSize = Math.max(7, maxFontSize);
        ctx.font = `600 ${fontSize}px -apple-system,sans-serif`;
        ctx.textBaseline = "top";

        // Word wrap title
        const textPad = 3;
        const maxW = r.w - textPad * 2;
        const lines = wrapText(occ.title, maxW, ctx);
        const lineH = fontSize * 1.2;
        const maxLines = Math.floor((r.h - textPad * 2 - fontSize) / lineH);

        for (let i = 0; i < Math.min(lines.length, Math.max(1, maxLines)); i++) {
          ctx.fillText(lines[i], r.x + textPad, r.y + textPad + i * lineH, maxW);
        }

        // Value label
        if (r.h > 36) {
          const valStr = layer.fmt(val, occ);
          ctx.fillStyle = "rgba(255,255,255,0.7)";
          const valFontSize = Math.max(6, fontSize * 0.8);
          ctx.font = `400 ${valFontSize}px -apple-system,sans-serif`;
          const valY = r.y + r.h - textPad - valFontSize;
          if (valY > r.y + textPad + Math.min(lines.length, maxLines) * lineH) {
            ctx.fillText(valStr, r.x + textPad, valY, maxW);
          }
        }
      }
    }
  }
}

function wrapText(text, maxWidth, ctx) {
  const words = text.split(/\s+/);
  const lines = [];
  let current = "";
  for (const word of words) {
    const test = current ? current + " " + word : word;
    if (ctx.measureText(test).width > maxWidth && current) {
      lines.push(current);
      current = word;
    } else {
      current = test;
    }
  }
  if (current) lines.push(current);
  return lines;
}

/* ── Interaction ── */
function getTileAt(mx, my) {
  // Search in reverse (last drawn = on top)
  for (let i = tileRects.length - 1; i >= 0; i--) {
    const t = tileRects[i];
    if (mx >= t.x && mx <= t.x + t.w && my >= t.y && my <= t.y + t.h) {
      return t.occ;
    }
  }
  return null;
}

function onMouseMove(e) {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const occ = getTileAt(mx, my);

  if (occ !== hoveredOcc) {
    hoveredOcc = occ;
    render();
  }

  if (occ) {
    tooltip.style.display = "block";
    tooltip.querySelector(".tt-title").textContent = occ.title;
    tooltip.querySelector(".tt-cat").textContent = `CNO ${occ.cno_code} \u00b7 ${occ.category_label}`;
    document.getElementById("tt-jobs").textContent = fmtN.format(occ.jobs);
    document.getElementById("tt-pay").textContent = fmtEUR.format(occ.pay);
    document.getElementById("tt-outlook").textContent = (occ.outlook >= 0 ? "+" : "") + occ.outlook.toFixed(1) + "% \u00b7 " + occ.outlook_desc;
    document.getElementById("tt-edu").textContent = occ.education + ` (nivel ${occ.education_level})`;
    document.getElementById("tt-ai").textContent = occ.exposure + "/10";
    document.getElementById("tt-rationale").textContent = occ.exposure_rationale || "";

    // Position tooltip
    let tx = e.clientX + 14;
    let ty = e.clientY + 14;
    const tw = tooltip.offsetWidth;
    const th = tooltip.offsetHeight;
    if (tx + tw > window.innerWidth - 10) tx = e.clientX - tw - 10;
    if (ty + th > window.innerHeight - 10) ty = e.clientY - th - 10;
    tooltip.style.left = tx + "px";
    tooltip.style.top = ty + "px";
  } else {
    tooltip.style.display = "none";
  }
}

function onClick(e) {
  const rect = canvas.getBoundingClientRect();
  const occ = getTileAt(e.clientX - rect.left, e.clientY - rect.top);
  if (occ && occ.url) window.open(occ.url, "_blank");
}

/* ── Statistics ── */
function updateStats() {
  const layer = LAYERS[currentLayer];
  const occs = DATA.occupations;
  const totalJobs = occs.reduce((s, o) => s + o.jobs, 0);

  // Weighted average
  let weightedSum = 0;
  occs.forEach(o => { weightedSum += o[layer.field] * o.jobs; });
  const weightedAvg = totalJobs > 0 ? weightedSum / totalJobs : 0;

  const vals = occs.map(o => o[layer.field]).sort((a, b) => a - b);
  const minVal = vals[0];
  const maxVal = vals[vals.length - 1];
  const medianVal = vals[Math.floor(vals.length / 2)];

  let summaryHTML = "";
  summaryHTML += `<div class="stat-row"><span class="stat-label">${layer.statLabel}</span><span class="stat-val">${layer.fmt(weightedAvg, {education:"—"})}</span></div>`;
  summaryHTML += `<div class="stat-row"><span class="stat-label">Mediana</span><span class="stat-val">${layer.fmt(medianVal, {education:"—"})}</span></div>`;
  summaryHTML += `<div class="stat-row"><span class="stat-label">Rango</span><span class="stat-val">${layer.fmt(minVal, {education:"—"})} \u2013 ${layer.fmt(maxVal, {education:"—"})}</span></div>`;
  summaryHTML += `<div class="stat-row"><span class="stat-label">Ocupaciones</span><span class="stat-val">${occs.length}</span></div>`;
  summaryHTML += `<div class="stat-row"><span class="stat-label">Empleados</span><span class="stat-val">${fmtN.format(totalJobs)}</span></div>`;
  document.getElementById("stats-summary").innerHTML = summaryHTML;
  document.getElementById("stats-title").textContent = layer.title;

  // Distribution
  let distHTML = "<h3 style='font-size:.78rem;margin-bottom:8px;color:var(--text-dim)'>Distribuci\u00f3n por empleo</h3>";
  const bins = getBins(currentLayer);

  for (const bin of bins) {
    let binJobs = 0;
    occs.forEach(o => {
      const v = o[layer.field];
      if (v >= bin.min && v < bin.max) binJobs += o.jobs;
    });
    const pct = totalJobs > 0 ? (binJobs / totalJobs * 100) : 0;
    const color = layer.color((bin.min + bin.max) / 2);
    distHTML += `<div class="dist-bar-wrap">`;
    distHTML += `<div class="dist-bar-label">${bin.label}</div>`;
    distHTML += `<div class="dist-bar-outer"><div class="dist-bar-inner" style="width:${Math.max(1, pct)}%;background:${color}"></div></div>`;
    distHTML += `<div class="dist-bar-pct">${pct.toFixed(1)}%</div>`;
    distHTML += `</div>`;
  }
  document.getElementById("stats-dist").innerHTML = distHTML;
}

function getBins(layerKey) {
  switch (layerKey) {
    case "outlook": return [
      {label: "En descenso (< 0%)", min: -100, max: 0},
      {label: "Estable (0\u20132%)", min: 0, max: 2},
      {label: "Moderado (2\u20135%)", min: 2, max: 5},
      {label: "Alto (5\u201310%)", min: 5, max: 10},
      {label: "Muy alto (> 10%)", min: 10, max: 100},
    ];
    case "pay": return [
      {label: "< 18.000 \u20ac", min: 0, max: 18000},
      {label: "18.000\u201325.000 \u20ac", min: 18000, max: 25000},
      {label: "25.000\u201335.000 \u20ac", min: 25000, max: 35000},
      {label: "35.000\u201350.000 \u20ac", min: 35000, max: 50000},
      {label: "> 50.000 \u20ac", min: 50000, max: 999999},
    ];
    case "education": return [
      {label: "Sin cualificaci\u00f3n / ESO", min: 1, max: 3},
      {label: "FP B\u00e1sica", min: 3, max: 4},
      {label: "Bachillerato / FP Medio", min: 4, max: 5},
      {label: "FP Superior", min: 5, max: 6},
      {label: "Grado / M\u00e1ster / Doctorado", min: 6, max: 9},
    ];
    case "exposure": return [
      {label: "Baja (0\u20132)", min: 0, max: 3},
      {label: "Media (3\u20135)", min: 3, max: 6},
      {label: "Alta (6\u20138)", min: 6, max: 9},
      {label: "Muy alta (9\u201310)", min: 9, max: 11},
    ];
    default: return [];
  }
}

/* ── Init ── */
loadData();
</script>
</body>
</html>
